<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Diagonal Linear Gradient matching the website's logo: from-primary (#0066ff) to-accent-purple (#8b5cf6) -->
    <linearGradient id="navLogoGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0066ff" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
  </defs>

  <!-- Solid Gradient Circle -->
  <circle cx="256" cy="256" r="256" fill="url(#navLogoGrad)" />

  <!-- Bold, Tighter Centered BN Text -->
  <text
    x="256"
    y="256"
    font-family="system-ui, -apple-system, 'Inter', 'Outfit', 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="210"
    font-weight="900"
    letter-spacing="-12"
    fill="#ffffff"
    dominant-baseline="central"
    text-anchor="middle"
  >BN</text>
</svg>
